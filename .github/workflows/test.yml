name: TSAB QA Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r dashboard-frontend/requirements.txt
        pip install -r requirements-dev.txt
        pip install -r analytics-mcp/requirements.txt
        pip install -r strategy-agent/requirements.txt

    - name: Run preflight checks
      run: |
        python preflight.py
